#
# Runs the same gates you run by hand, on every PR + push to main. Three jobs run in
# parallel; a red job blocks the merge. Fail in CI, not in prod.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to the same branch cancels the in-progress run — don't waste minutes on
# stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    name: worker (ruff · pyright · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@vmain
        with:
          enable-cache: true
          cache-dependency-glob: apps/worker/uv.lock
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright .
      - run: uv run pytest -q

  web:
    name: web (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: demo e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Browser binaries + their system deps. Cached by the action via the pnpm store
      # is not enough — Playwright browsers live elsewhere, so install them explicitly.
      - run: pnpm --filter demo exec playwright install --with-deps chromium
      - run: pnpm --filter demo test:e2e
