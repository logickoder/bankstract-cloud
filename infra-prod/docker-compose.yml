#
# Production stack: worker + app (dashboard) + demo behind Caddy, plus a nightly R2 backup.
# Distinct from infra/ (the worker+demo self-host bundle). Marketing + docs are hosted on
# Cloudflare Pages, not on this box. TLS is terminated by Cloudflare, so Caddy serves plain :80.
#   cp .env.example .env   # fill the secrets
#   docker compose up --build -d
#
# Routing (see Caddyfile): /v1,/healthz,/readyz -> worker; /app/* -> dashboard; / -> demo.

services:
  worker:
    build:
      context: ../apps/worker
    environment:
      ENV: production
      AUDIT_DB_PATH: /data/audit.sqlite
      # Must match the demo's DEMO_API_KEY; and ADMIN_API_TOKEN must match the app's.
      DEMO_API_KEY: ${DEMO_API_KEY:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PLAN_STARTER: ${PAYSTACK_PLAN_STARTER:-}
      PAYSTACK_PLAN_GROWTH: ${PAYSTACK_PLAN_GROWTH:-}
      PAYSTACK_PLAN_SCALE: ${PAYSTACK_PLAN_SCALE:-}
      PAYSTACK_PLAN_STARTER_ANNUAL: ${PAYSTACK_PLAN_STARTER_ANNUAL:-}
      PAYSTACK_PLAN_GROWTH_ANNUAL: ${PAYSTACK_PLAN_GROWTH_ANNUAL:-}
      PAYSTACK_PLAN_SCALE_ANNUAL: ${PAYSTACK_PLAN_SCALE_ANNUAL:-}
      ALLOWED_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - audit:/data
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: apps/app/Dockerfile
      args:
        APP_BASE_PATH: /app
        NEXT_PUBLIC_BETTER_AUTH_URL: ${PUBLIC_ORIGIN:-http://localhost}/app
    environment:
      AUTH_DB_PATH: /data/auth.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      # Includes the /app prefix so Better Auth builds correct absolute callback URLs.
      BETTER_AUTH_URL: ${PUBLIC_ORIGIN:-http://localhost}/app
      WORKER_URL: http://worker:8000
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - auth:/data
    depends_on:
      - worker
    restart: unless-stopped

  demo:
    build:
      context: ..
      dockerfile: apps/demo/Dockerfile
      args:
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
    environment:
      WORKER_URL: http://worker:8000
      DEMO_API_KEY: ${DEMO_API_KEY:-}
    depends_on:
      - worker
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Empty -> ":80" (behind Cloudflare). Set to your hostname for Caddy's own Let's Encrypt TLS.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - worker
      - app
      - demo
    restart: unless-stopped

  # Nightly SQLite snapshot of both DBs to Cloudflare R2. No R2 creds => snapshots locally only.
  backup:
    image: alpine:3.20
    environment:
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
    volumes:
      - audit:/data/audit:ro
      - auth:/data/auth:ro
      - ./backup.sh:/backup.sh:ro
    entrypoint: ["sh", "/backup.sh"]
    restart: unless-stopped

volumes:
  audit:
  auth:
  caddy_data:
  caddy_config:
