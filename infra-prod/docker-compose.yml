#
# Production stack: worker + web + Caddy, plus a nightly R2 backup. One Next runtime (web) serves
# marketing /, the demo /demo, and the dashboard (/dashboard, /sign-in, /api/*) in a single image
# to keep RAM low on the 4GB box. Distinct from infra/ (the lean worker+demo self-host bundle).
# Docs live on Cloudflare Pages (a docs.* subdomain), off this box. Caddy terminates TLS itself
# (Let's Encrypt) when SITE_ADDRESS is a hostname - DNS points straight at the box, no Cloudflare.
#   cp .env.example .env   # fill the secrets
#   docker compose up --build -d
#
# Routing (see Caddyfile): /v1,/healthz,/readyz -> worker; everything else -> web.

services:
  worker:
    build:
      context: ../apps/worker
    environment:
      ENV: production
      AUDIT_DB_PATH: /data/audit.sqlite
      # Must match the demo's DEMO_API_KEY; and ADMIN_API_TOKEN must match the app's.
      DEMO_API_KEY: ${DEMO_API_KEY:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PLAN_STARTER: ${PAYSTACK_PLAN_STARTER:-}
      PAYSTACK_PLAN_GROWTH: ${PAYSTACK_PLAN_GROWTH:-}
      PAYSTACK_PLAN_SCALE: ${PAYSTACK_PLAN_SCALE:-}
      PAYSTACK_PLAN_STARTER_ANNUAL: ${PAYSTACK_PLAN_STARTER_ANNUAL:-}
      PAYSTACK_PLAN_GROWTH_ANNUAL: ${PAYSTACK_PLAN_GROWTH_ANNUAL:-}
      PAYSTACK_PLAN_SCALE_ANNUAL: ${PAYSTACK_PLAN_SCALE_ANNUAL:-}
      ALLOWED_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - audit:/data
    restart: unless-stopped

  # One Next runtime: marketing /, demo /demo, dashboard /dashboard + /sign-in + /api/*. The
  # dashboard is a route group, NOT an /app path segment, so auth is origin-based - BETTER_AUTH_URL
  # is the bare PUBLIC_ORIGIN (no /app suffix) and the browser auth client base is empty (= origin).
  # NEXT_PUBLIC_* are inlined at build, so they are passed as build args, not runtime env.
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # Empty = window origin (single-origin shell). Do not set unless auth runs on another host.
        NEXT_PUBLIC_BETTER_AUTH_URL: ""
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_ORIGIN:-http://localhost}
        # Docs are surfaced at the same-domain /docs path (Caddy proxies /docs/* to the Pages
        # project), so in-app docs links are root-relative. Not a separate origin.
        NEXT_PUBLIC_DOCS_URL: /docs
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
    environment:
      AUTH_DB_PATH: /data/auth.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${PUBLIC_ORIGIN:-http://localhost}
      WORKER_URL: http://worker:8000
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      # Must match the worker's DEMO_API_KEY so the anonymous /demo tier authenticates.
      DEMO_API_KEY: ${DEMO_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - auth:/data
    depends_on:
      - worker
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Empty -> ":80" (behind Cloudflare). Set to your hostname for Caddy's own Let's Encrypt TLS.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      # The Cloudflare Pages host Caddy proxies /docs/* to (e.g. bankstract-docs.pages.dev).
      DOCS_UPSTREAM: ${DOCS_UPSTREAM:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - worker
      - web
    restart: unless-stopped

  # Nightly SQLite snapshot of both DBs to Cloudflare R2. No R2 creds => snapshots locally only.
  backup:
    image: alpine:3.20
    environment:
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
    volumes:
      - audit:/data/audit:ro
      - auth:/data/auth:ro
      - ./backup.sh:/backup.sh:ro
    entrypoint: ["sh", "/backup.sh"]
    restart: unless-stopped

volumes:
  audit:
  auth:
  caddy_data:
  caddy_config:
