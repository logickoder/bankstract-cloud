packages:
  - apps/*
  - packages/*
allowBuilds:
  # Unused: apps/app uses libSQL (prebuilt). better-sqlite3 lingers only as a Better Auth
  # optional peer; never build its native binary (it fails under Node 24 and we don't load it).
  better-sqlite3: false
  esbuild: true
  sharp: true
  # Pulled in by @scalar/api-client-react (OpenAPI playground). Its postinstall only
  # selects a Vue build; the React client does not need it.
  vue-demi: false

minimumReleaseAgeExclude:
  - fumadocs-core@16.10.5
  - fumadocs-openapi@11.0.3
  - fumadocs-ui@16.10.5

# Pin transitive deps to patched versions (pnpm audit advisories).
overrides:
  postcss@<8.5.10: ">=8.5.10"
  esbuild@>=0.27.3 <0.28.1: ">=0.28.1"
  # GHSA-67mh-4wv8-2f99: esbuild <=0.24.2 dev-server CORS. Reaches us only via the deprecated
  # @esbuild-kit loader (drizzle-kit config load, no dev server), so unreachable in practice;
  # bump anyway to clear the advisory.
  esbuild@<0.25.0: ">=0.25.0"
  # GHSA-gpj5-g38j-94v9: drizzle-orm <0.45.2 SQL identifier-injection (reachable via auth DB).
  drizzle-orm@<0.45.2: ">=0.45.2"

# apps/worker is Python (uv-managed) and has no package.json. pnpm skips it.
