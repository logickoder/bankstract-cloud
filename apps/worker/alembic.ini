# Alembic config for CLI use (revisions, manual upgrade/downgrade). The worker runs
# migrations programmatically via db.run_migrations() at boot, which sets these itself.
# Usage: cd apps/worker && uv run alembic revision -m "add X" ; uv run alembic upgrade head
[alembic]
script_location = src/bankstract_cloud/migrations
prepend_sys_path = src
